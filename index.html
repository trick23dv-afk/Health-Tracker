<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Blood Pressure & Blood Sugar Tracker</h1>

  <form id="trackerForm">
    <label>Patient Name: <input type="text" id="name" required></label>
    <label>Systolic (mmHg): <input type="number" id="systolic" required></label>
    <label>Diastolic (mmHg): <input type="number" id="diastolic" required></label>
    <label>Blood Sugar (mg/dL): <input type="number" id="sugar" required></label>
    <label>Remarks (optional): <input type="text" id="remarks"></label>
    <button type="submit">Add Record</button>
  </form>

  <table id="recordsTable">
    <thead>
      <tr>
        <th>Patient</th>
        <th>Systolic</th>
        <th>Diastolic</th>
        <th>Status</th>
        <th>Blood Sugar</th>
        <th>Remarks</th>
        <th>Date & Time</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
